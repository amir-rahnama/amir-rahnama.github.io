baseURL = "https://amir-rahnama.github.io/"
languageCode = "en-us"
title = "Amir Rahnama"
theme = "PaperMod"

canonifyurls = true
enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true


[[menu.main]]
identifier = "archives"
name = "Blog Posts"
url = "archives"
weight = 10

[[menu.main]]
identifier = "tags"
name = "Topics"
url = "tags"
weight = 20

[[menu.main]]
identifier = "cv"
name = "CV"
url = "cv"
weight = 30

[params]
env = "production"
math = true
description = "Theme PaperMod - https://github.com/adityatelange/hugo-PaperMod"
author = "Theme PaperMod"
defaultTheme = "auto"
ShowShareButtons = true
ShowReadingTime = true
displayFullLangName = true
ShowPostNavLinks = false
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowRssButtonInSectionTermList = true
ShowToc = true
images = [ "papermod-cover.png" ] 
customCSS = ["css/custom.css", "css/extended/animated-background.css"]
customJS = ["js/fadein.js"]
  [params.profileMode]
  enabled = true
  title = "Amir Rahnama"
  
  imageUrl = "amir.png"
  imageTitle = "my image"

    #[[params.profileMode.buttons]]
    #name = "Archive"
    #url = "archives"

    #[[params.profileMode.buttons]]
    #name = "Tags"
    #url = "tags"

  [params.homeInfoParams]
Title = "PaperMod"
Content = """![alt text](amir.png)
PhD Student at KTH Royal Institute of Technology.
- I write about Machine Learning, Statistics and Mathematics.
"""

  [[params.socialIcons]]
  name = "googlescholar"
  url = "https://scholar.google.com/citations?user=qOBAzfwAAAAJ&hl=sv"

  [[params.socialIcons]]
  name = "github"
  url = "https://github.com/amir-rahnama"

  [[params.socialIcons]]
  name = "twitter"
  url = "https://x.com/amirrahnama_"

[caches]
  [caches.images]
    dir = ':cacheDir/images'